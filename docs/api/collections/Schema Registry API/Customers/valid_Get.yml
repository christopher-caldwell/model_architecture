info:
    name: "[Valid] Customer"
    type: http
    seq: 1
    tags:
        - Customers

http:
    method: GET
    url: "{{BASE_URL}}/customers?v=2.0.0"
    params:
        - name: v
          value: 2.0.0
          type: query
    auth: inherit

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

examples:
    - name: 200 Response
      description: Successful Response
      request:
          url: "{{BASE_URL}}/customers"
          method: GET
          params:
              - name: v
                value: v1.0.0
                type: query
      response:
          status: 200
          statusText: OK
          headers:
              - name: Content-Type
                value: application/json
          body:
              type: json
              data: |-
                  {
                    "id": 0,
                    "ident": "",
                    "email": "",
                    "first_name": "",
                    "last_name": "",
                    "phone": 0,
                    "country": "",
                    "dt_created": ""
                  }
    - name: 400 Response
      description: Missing query param
      request:
          url: "{{BASE_URL}}/customers"
          method: GET
          params:
              - name: v
                value: v1.0.0
                type: query
