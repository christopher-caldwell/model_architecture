info:
  name: "[Invalid Payload] Create"
  type: http
  seq: 4
  tags:
    - Products

http:
  method: POST
  url: "{{BASE_URL}}/products"
  body:
    type: json
    data: |-
      {
        "entity_version": "1.1.0",
        "name": "Widget Pro",
        "description": "A high-quality widget",
        "price": 29.99,
        "currency": "USD",
        "category": "Electronics",
        "sku": "WGT-001",
        "stock_quantity": 100
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 400 Response
    description: Missing required id and ident fields
    request:
      url: "{{BASE_URL}}/products"
      method: POST
      body:
        type: json
        data: |-
          {
            "entity_version": "1.1.0",
            "name": "Widget Pro",
            "description": "A high-quality widget",
            "price": 29.99,
            "currency": "USD",
            "category": "Electronics",
            "sku": "WGT-001",
            "stock_quantity": 100
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Schema validation failed"
          }
