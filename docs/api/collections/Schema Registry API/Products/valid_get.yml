info:
  name: "[Valid] Product"
  type: http
  seq: 1
  tags:
    - Products

http:
  method: GET
  url: "{{BASE_URL}}/products?v=1.1.0"
  params:
    - name: v
      value: 1.1.0
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{BASE_URL}}/products"
      method: GET
      params:
        - name: v
          value: 1.1.0
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "ident": "",
            "name": "",
            "description": "",
            "price": 0,
            "currency": "",
            "category": "",
            "sku": "",
            "stock_quantity": 0
          }
  - name: 400 Response
    description: Missing query param
    request:
      url: "{{BASE_URL}}/products"
      method: GET
      params:
        - name: v
          value: 1.1.0
          type: query
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
  - name: 422 Response
    description: Unknown schema version
    request:
      url: "{{BASE_URL}}/products"
      method: GET
      params:
        - name: v
          value: 1.1.0
          type: query
    response:
