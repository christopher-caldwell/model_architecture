info:
  name: Books
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query {
        books {
          isbn
          dtCreated
          dtModified
          authorName
          title
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
